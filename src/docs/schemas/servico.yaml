components:
  schemas:

    Servico:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: "Serviço de Limpeza"
        descricao:
          type: string
          example: "Serviço de Limpeza Profissional para residência"
        categoria:
          type: string
          example: "limpeza"
        enabled:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: "2022-01-01T00:00:00.000Z"
        updated_at:
          type: string
          format: date-time
          example: "2022-01-01T00:00:00.000Z"

    CreateService:
      type: object
      properties:
        nome:
          type: string
          example: "Serviço de Limpeza"
        descricao:
          type: string
          example: "Limpeza profissional"
        categoria:
          type: string
          example: "Limpeza"
        enabled:
          type: boolean
          example: true
      required:
        - nome
        - descricao
        - categoria
        - enabled

    ResponseSuccess:
      type: object
      properties:
        message:
          type: string
          example: "Serviço criado com sucesso"
        status:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/Servico"

    ResponseError:
      type: object
      properties:
        message:
          type: string
          example: "Erro ao buscar serviços"
        status:
          type: boolean
          example: false
        data:
          type: object
          nullable: true

    ServicoDetalhado:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: "Serviço de Limpeza"
        descricao:
          type: string
          example: "Serviço de limpeza profissional para residências e empresas."
        designacao_categoria:
          type: string
          example: "Limpeza"
        icone_categoria:
          type: string
          example: ""
        id_empresa:
          type: integer
          example: 1
        designacao_empresa:
          type: string
          example: "Empresa de limpeza"
        icone_empresa:
          type: string
          example: ""
        enabled:
          type: boolean
          example: true