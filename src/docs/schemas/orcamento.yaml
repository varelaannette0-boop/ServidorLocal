components:
  schemas:

    Orcamento:
      type: object
      properties:
        id:
          type: string
          example: "2"
        total:
          type: number
          example: 1000
        id_utilizadores:
          type: string
          example: "M002b"
        enabled:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: "2010-12-10T00:00:00.000Z"
        updated_at:
          type: string
          format: date-time
          example: "2010-12-10T00:00:00.000Z"

    CreateOrcamento:
      type: object
      properties:
        total:
          type: number
          example: 1000
        id_utilizadores:
          type: string
          example: "M002b"
        enabled:
          type: boolean
          example: true
      required:
        - total
        - id_utilizadores
        - enabled

    ResponseSuccess:
      type: object
      properties:
        message:
          type: string
          example: "Orcamento criado com sucesso"
        status:
          type: boolean
          example: true

    ResponseError:
      type: object
      properties:
        message:
          type: string
          example: "Erro ao buscar Orcamento"
        status:
          type: boolean
          example: false
        data:
          type: object