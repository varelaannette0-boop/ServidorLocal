#schema/orcamento.yaml

components:
    schemas:
      Categoria:
          type: object
          properties:
            id:
               type: string
               example: 2
      designacao:
          type: string
          example: "contrucao civil"
      icone:
type: string
example: "Image"
created_at:
type: string
example: "2010-12-10T00:00:00.000Z"
updated_at:
typr: string
example: "2010-12-10T00:00.000Z"

CreateCategoria:
type: object
properties:
total:
type: number
example: 1000
id_utilizadores:
type: string
example: "M002b "
