#schema/user.yaml

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          example: 4f4662d3-27fc-4e29-ac53-1a9ecf73e69e
        nome:
          type: string
          example: "Lula Inacio"
        numero_identificacao:
          type: string
          example: "M002b "
        data_nascimento:
          type: string
          example: "1950-04-01"
        email:
          type: string
          example: "mentiroso@gmail.com"
        password:
          type: string
          example: "$12$wOkrxlIb51AYJKFadnuSR.3k292v/lMsyqoKYmDae5LcgOuNQIWXy"
        telefone:
          type: string
          example: "9919191"
        pais:
          type: string
          example: "Brasil"
        localidade:
          type: string
          example: "Rio de Janeiro"
        enabled:
          type: boolean
          example: true
        created_at:
          type: string
          example: "2010-12-10T00:00:00.000Z"
        updated_at:
            typr: string
            example: "2010-12-10T00:00.000Z"
  
    CreateUser:
      type: object
      properties:
        nome:
          type: string
          example: "Lula Inacio"
        numero_identificacao:
          type: string
          example: "M002b "
        data_nascimento:
          type: string
          example: "1950-04-01"
        email:
          type: string
          example: "mentiroso@gmail.com"
        password:
          type: string
          example: "$12$wOkrxlIb51AYJKFadnuSR.3k292v/lMsyqoKYmDae5LcgOuNQIWXy"
        telefone:
          type: string
          example: "9919191"
        pais:
          type: string
          example: "Brasil"
        localidade:
          type: string
          example: "Rio de Janeiro"
        enabled:
          type: boolean
          example: true
      required:
        - nome  
        - numero_identificacao  
        - data_nascimento  
        - email  
        - password  
        - telefone  
        - pais  
        - localidade  
        - enabled  

      LoginUser:
         type: object
         properties:
            email:
              type: string
              example: "user@example.com"
            password:
              type: string
              example: "senha123"


    #Schema generico para sucesso
    ResponseSucess:
      type: object
      propreties:
        message:
          type: string
          example: "Utilizador criado com sucesso"
        status:
          type: boolean
          example: true

    #user generico de resposta de erro
    ResponseError:
      type: object
      properties:
        message:
          type: string
          example: "Erro ao buscar utilizadores"
        status:
          type: boolean
          example: false
        data:
          type: object