paths:
  /prestacao-servico:
    get:
      summary: Buscar todas as prestações de serviço
      tags:
        - Prestação de Serviço
      description: Retorna uma lista de todas as prestações de serviço
      responses:
        "200":
          description: Prestações de serviço encontradas com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSuccess"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
        "500":
          description: Erro ao buscar prestações de serviço
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"

  /prestacao-servico/create:
    post:
      summary: Criar uma nova prestação de serviço
      tags:
        - Prestação de Serviço
      description: Cria uma nova prestação de serviço
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePrestacaoServico"
      responses:
        "200":
          description: Criada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSuccess"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
        "500":
          description: Erro ao criar prestação de serviço
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"

  /prestacao-servico/get-by-id/{id}:
    get:
      summary: Buscar uma prestação de serviço por ID
      tags:
        - Prestação de Serviço
      description: Retorna uma prestação de serviço por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "1"
      responses:
        "200":
          description: Encontrada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSuccess"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
        "500":
          description: Erro ao buscar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"

  /prestacao-servico/update/{id}:
    put:
      summary: Atualizar uma prestação de serviço
      security:
        - bearerAuth: []
      tags:
        - Prestação de Serviço
      description: Atualiza uma prestação de serviço
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "1"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePrestacaoServico"
      responses:
        "200":
          description: Atualizada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSuccess"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
        "500":
          description: Erro ao atualizar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"

  /prestacao-servico/delete/{id}:
    delete:
      summary: Deletar uma prestação de serviço
      tags:
        - Prestação de Serviço
      description: Deleta uma prestação de serviço
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "1"
      responses:
        "200":
          description: Deletada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSuccess"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
        "500":
          description: Erro ao deletar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"

  /prestacao-servico/get-by-categoria/{categoria}:
    get:
      summary: Buscar prestações por categoria
      tags:
        - Prestação de Serviço
      description: Retorna prestações de serviço por categoria
      parameters:
        - name: categoria
          in: path
          required: true
          schema:
            type: string
            example: "1"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            example: 10
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            example: 0
      responses:
        "200":
          description: Lista encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSuccess"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
        "500":
          description: Erro ao buscar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"

  /prestacao-servico/get-all-detalhado:
    get:
      summary: Buscar todas as prestações detalhadas
      tags:
        - Prestação de Serviço
      description: Retorna lista detalhada
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            example: 10
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            example: 0
      responses:
        "200":
          description: Lista detalhada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSuccess"
        "500":
          description: Erro ao buscar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"