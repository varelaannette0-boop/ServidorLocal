paths:
  /categoria:
    get:
      summary: Listar todas as categorias
      tags:
        - Categoria
      description: Retorna uma lista de todas as categorias disponíveis
      responses:
        "200":
          description: Lista de categorias
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Categoria"
        "404":
          description: Nenhuma categoria encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"

  /categoria/create:
    post:
      summary: Criar uma nova categoria
      tags:
        - Categoria
      description: Cria uma nova categoria
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoria"
      responses:
        "200":
          description: Categoria criada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSucess"
        "400":
          description: Erro ao criar categoria
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"

  /categoria/get-by-id/{id}:
    get:
      summary: Buscar categoria por ID
      tags:
        - Categoria
      description: Retorna uma categoria especificada pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID da categoria
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Categoria encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSucess"
        "404":
          description: Categoria não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"

  /categoria/update/{id}:
    put:
      summary: Atualizar categoria por ID
      tags:
        - Categoria
      description: Atualiza uma categoria especificada pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID da categoria
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoria"
      responses:
        "200":
          description: Categoria atualizada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSucess"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
        "404":
          description: Categoria não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"

  /categoria/delete/{id}:
    delete:
      summary: Apagar categoria
      tags:
        - Categoria
      description: Apaga uma categoria especificada pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID da categoria
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Categoria apagada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSucess"
        "404":
          description: Categoria não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"