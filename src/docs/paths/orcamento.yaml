# paths/orcamento.yaml
paths:
  /orcamento:
    get:
      summary: Listar todos os orcamento
      tags:
        - Orcamento
      description: Retorna uma lista de todos os orcamento disponíveis
      responses:
        "200":
          description: Lista de orcamento
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Orcamento"
        "404":
          description: "Nenhum orcamento encontrado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"

  /orcamento/create:
    post:
      summary: Criar um novo orcamento
      tags:
        - Orcamento
      description: Cria um novo orcamento
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrcamento"
      responses:
        "200":
          description: Orcamento criado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSucess"
        "400":
          description: Erro ao criar orcamento
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"

  /orcamento/get-by-id/{id}:
    get:
      summary: Buscar um orcamento por ID
      tags:
        - Orcamento
      description: Retorna um orcamento especificado pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do orcamento
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Orcamento encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseSucess"
        "404":
          description: Orcamento nao encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseError"
  /orcamento/update/{id}:
    put:
      summary: Actualizar um orcamento por ID
      tags:
        - Orcamento
      description: Actualiza um orcamento especificado pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do orcamento
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $href: "#/components/schemas/CreateOrcamento" #tem mesma informacao de CreateUser
      responses:
        "200":
          description: Orcamento actualizado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseSucess"
        "400":
          description: Dados invalidos
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseError"
        "404":
          description: Orcamento nao encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseError"
  /orcamento/delete/{id}:
    delete:
      summary: Apaga um orcamento
      tags:
        - Orcamento
      description: Apaga um orcamento especificado pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do orcamento
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Orcamento apagado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseSucess"
        "404":
          description: Orcamento nao encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseError"