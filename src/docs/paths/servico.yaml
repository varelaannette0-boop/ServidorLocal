paths:
  /service:
    get:
      summary: Listar todos os serviços
      tags:
        - Servico
      description: Retorna uma lista de todos os serviços disponíveis
      responses:
        "200":
          description: Lista de serviços
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
        "404":
          description: Nenhum serviço encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"

  /service/create:
    post:
      summary: Criar um novo serviço
      tags:
        - Servico
      description: Cria um novo serviço
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateService"
      responses:
        "200":
          description: Serviço criado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSuccess"
        "400":
          description: Erro ao criar serviço
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"

  /service/get-by-id/{id}:
    get:
      summary: Buscar um serviço por ID
      tags:
        - Servico
      description: Retorna um serviço pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do serviço
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Serviço encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSuccess"
        "404":
          description: Serviço não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"

  /service/update/{id}:
    put:
      summary: Atualizar um serviço por ID
      tags:
        - Servico
      description: Atualiza um serviço
      parameters:
        - name: id
          in: path
          required: true
          description: ID do serviço
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateService"
      responses:
        "200":
          description: Serviço atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSuccess"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
        "404":
          description: Serviço não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"

  /service/delete/{id}:
    delete:
      summary: Apagar um serviço
      tags:
        - Servico
      description: Apaga um serviço pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do serviço
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Serviço apagado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSuccess"
        "404":
          description: Serviço não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"

  /service/all-detailed:
    get:
      summary: Listar todos os serviços detalhados
      tags:
        - Servico
      description: Retorna serviços com detalhes
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            example: 10
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            example: 0
      responses:
        "200":
          description: Lista de serviços detalhados
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServicoDetalhado"
        "404":
          description: Nenhum serviço encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"