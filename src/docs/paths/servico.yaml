# paths/servico.yaml

paths:
  /service:
   get:
     summary: Listar todos os servicos
     description: Retorna um lista de todos os servicos disponiveis
     responses:
       "200":
        description: Lista de servicos
        content:
          application/json:
           schema:
             type: array
             items: 
               $ref: "#/components/schemas/Servico"
       "404":
       description: "Nenhum serviço encontrado"
       content:
          application/json:
             schema:
               type : object
               $ref: "#/components/schemas/ResponseError"
  /service/create:
      post:
       sumarry: Criar um novo serviço
       description: cria um novo serviço
       requestBody:
          required: true
          content:
            application/json:
               schema: 
                  type: object
                  $ref: "#/components/schemas/CreateService"
      responses:
         "200":
            description: Serviço criado com sucesso
            content:
              application/json:
                    schema:
                       type: object
                       $ref: "#/components/schemas/ResponseSuccess"
            $ref: "#/components/schemas/ResponseSuccess"
         "400":
            description: Serviço criado com sucesso
            content:
              application/json:
                    schema:
                       type: object
            $ref: "#/components/schemas/ResponseError"

  /service/get-by-id/{id}:
     get:
       summary: Buscar um serviço por ID
       description: Retorna um serviço específico pelo ID
       parameters:
         - name: id
           in: path
           required: true
           description: ID do serviço
           schema:
              type: integer
              example: 1
     response:
       "200":
         description: Serviço encontrado
         content:
           application/json:
               schema:
                 type: object
                 $ref: "#/components/schemas/ResponseSuccess"
       "404":
         description: Serviço não encontrado
         content:
            application/json:
               schema:
                  type: object
                  $ref: "#/components/schemas/ResponseError"

  /service/update/{id}:
     put:
      summary: Atualizar um serviço
      description: Atualiza um serviço especifico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          descriotion: ID do serviço a ser atualizado
          schema:
             type: integer
             example: 1
      requestBody:
        required: true
        content:
          application/json:
               schema:
                 type: object
                 $ref: '#/components/schemas/CreateService'
      responses:
       "200":
         description: Serviço encontrado
         content:
           application/json:
               schema:
                 type: object
                 $ref: "#/components/schemas/ResponseSuccess"
       "400":
         description: Dados invalidos
         content:
            application/json:
               schema:
                  type: object
                  $ref: "#/components/schemas/ResponseError"

       "404":
         description: Servico não encontrado
         content:
            application/json:
               schema:
                  type: object
                  $ref: "#/components/schemas/ResponseError"  

  /service/delete/{id}:
    delete:
      summary: Apagar um serviço
      description: Apaga um serviço especifico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do serviço a ser apagado
          schema:
            type: integer
            example: 1
      responses:
         "200":
           description: Serviço apagado com sucesso
           content:
             application/json:
               schema:
                 type: object
                 $ref: "#/components/schemas/ResponseSuccess"
         "404":
         description: Servico não encontrado
         content:
            application/json:
               schema:
                  type: object
                  $ref: "#/components/schemas/ResponseError"  