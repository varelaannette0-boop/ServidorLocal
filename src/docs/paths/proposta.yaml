# paths/proposta.yaml
paths:
  /proposta:
    get:
      summary: Listar todos as propostas
      tags:
        - Proposta
      description: Retorna uma lista de todos as propostas disponíveis
      responses:
        "200":
          description: Lista de propostas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Proposta"
        "404":
          description: "Nenhum proposta encontrado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"

  /proposta/create:
    post:
      summary: Criar um novo proposta
      tags:
        - Proposta
      description: Cria um novo proposta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProposta"
      responses:
        "200":
          description: Proposta criado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSucess"
        "400":
          description: Erro ao criar proposta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"

  /proposta/get-by-id/{id}:
    get:
      summary: Buscar um proposta por ID
      tags:
        - Proposta
      description: Retorna um proposta especificado pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do proposta
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Servico encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseSucess"
        "404":
          description: Servico nao encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseError"
  /proposta/update/{id}:
    put:
      summary: Actualizar um proposta por ID
      tags:
        - Proposta
      description: Actualiza um proposta especificado pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do proposta
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $href: "#/components/schemas/CreateProposta" #tem mesma informacao de CreateService
      responses:
        "200":
          description: Servico actualizado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseSucess"
        "400":
          description: Dados invalidos
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseError"
        "404":
          description: Servico nao encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseError"
  /proposta/delete/{id}:
    delete:
      summary: Apaga um proposta
      tags:
        - Proposta
      description: Apaga um proposta especificado pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do proposta
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Servico apagado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseSucess"
        "404":
          description: Servico nao encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseError"